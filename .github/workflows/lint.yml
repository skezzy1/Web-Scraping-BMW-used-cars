name: Python Lint and Format (Ruff)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Ruff Linter
        uses: astral-sh/ruff-action@v1
        with:
          args: 'check .'

      - name: Run Ruff Formatter
        uses: astral-sh/ruff-action@v1
        with:
          args: 'format --check .'